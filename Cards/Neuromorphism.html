<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container {
            width: 400px ;
            height: 650px;
            border-radius: 20px;
            box-sizing: border-box;
            box-shadow: 2px 2px 5px grey;
            margin: 10vw;
        }
        p {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: 600;
        }
        .img-container {
            position: relative;
        }
        .like-box {
            position: absolute;
            top: 20px;
            left: 2-px;
            padding: 15px;
            border-radius: 50%;
            background-color: white;
        }
        .details {
            margin: 20px;
        }
        h2 {
            text-transform: uppercase;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            color: rgb(225, 151, 59);
        }
        h3 {
            background-color: black ;
            color: beige;
            width: 40%;
        }
    </style>
</head>
<body>
    <article id="container">
        <!--Section 1-->
        <section class="img-container">
            <div class="like-box">🩷</div>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR2clqIroZDLbkWU_f3TwJMgK5AVbKFMMBceg&s" alt="product image"
            width="100%"
            
            />
        </section>

        <!--Section 2-->
        <section class="details">
            <h2>Head Phones</h2>
            <h3>$80.00 USD</h3>
            <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Labore, ex cupiditate? Repellendus iure explicabo modi esse vel consectetur, ipsam blanditiis nesciunt eum! Itaque sint debitis iste aspernatur laboriosam deserunt eligendi!</p>
        </section>
    </article>
</body>
</html>

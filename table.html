<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
    <style>
        table,
        td,
        th,
        tr {
            border: 5px solid;
            border-collapse: collapse;
            padding: 5px;
        }
        thead {
            background-color: red;
        }
        tfoot,
        td{
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Emp Code</th>
                <th>Emp Name</th>
                <th>Job Title</th>
                <th>Salary(LPA)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>911</td>
                <td>Sujal Singh</td>
                <td>Developer</td>
                <td>10.5</td>
            </tr>

            <tr>
                <td>912</td>
                <td>Pawan</td>
                <td>Tester</td>
                <td>2.8</td>
            </tr>

            <tr>
                <td>913</td>
                <td>Prasanth</td>
                <td>Digital Marketing</td>
                <td>5.2</td>
            </tr>

            <tr>
                <td>914</td>
                <td>Sachin</td>
                <td>Developer</td>
                <td>3.5</td>
            </tr>

            <tr>
                <td>915</td>
                <td>Ritik</td>
                <td>HR</td>
                <td>3.6</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="4">This is table</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
